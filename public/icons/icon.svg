<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Andes">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2a4d"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="peakBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="peakFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="512" height="512" fill="url(#sky)"/>

    <!-- Sun -->
    <circle cx="376" cy="140" r="48" fill="#fbbf24" opacity="0.18"/>
    <circle cx="376" cy="140" r="32" fill="#fbbf24"/>

    <!-- Back peak -->
    <path d="M112 512 L326 132 L540 512 Z" fill="url(#peakBack)"/>
    <path d="M326 132 L371 212 L349 192 L326 212 L303 192 L283 212 Z" fill="#e2e8f0"/>

    <!-- Front peak -->
    <path d="M16 512 L172 236 L330 512 Z" fill="url(#peakFront)"/>
    <path d="M172 236 L211 304 L192 286 L172 304 L152 286 L134 304 Z" fill="#f8fafc"/>
  </g>
</svg>
