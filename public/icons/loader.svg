<svg xmlns="http://www.w3.org/2000/svg" width="124" height="80" viewBox="0 0 248 160" role="img" aria-label="Cargando">
  <style>
    .skyline {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .track { stroke: #38bdf8; opacity: 0.18; }
    .runner {
      stroke: #38bdf8;
      stroke-dasharray: 30 70;
      animation: andes-dash 1.4s linear infinite;
    }
    @keyframes andes-dash {
      to { stroke-dashoffset: -100; }
    }
    @media (prefers-reduced-motion: reduce) {
      .runner { animation: none; stroke-dasharray: none; opacity: 0.9; }
    }
  </style>
  <path class="skyline track" d="M16 140 L84 52 L120 100 L172 24 L232 140" pathLength="100"/>
  <path class="skyline runner" d="M16 140 L84 52 L120 100 L172 24 L232 140" pathLength="100"/>
</svg>
