<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión — Andes</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0a;
        color: #ededed;
      }
      @media (prefers-color-scheme: light) {
        body { background: #fff; color: #171717; }
      }
      .card { max-width: 380px; text-align: center; }
      .icon { font-size: 44px; margin-bottom: 12px; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; opacity: 0.75; margin: 0 0 20px; }
      button {
        font: inherit;
        font-weight: 600;
        padding: 12px 20px;
        border-radius: 10px;
        border: none;
        background: #2563eb;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📶</div>
      <h1>Sin conexión</h1>
      <p>
        Esta pantalla necesita señal para abrirse. Buscá un lugar con conexión y reintentá.
        <br /><br />
        Una entrega o devolución que ya está abierta sí funciona sin señal: seguí registrándola
        y se sincroniza sola al volver la conexión.
      </p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
